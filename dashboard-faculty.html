<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Module — OS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background-color: var(--white); }
    .top-section { background: var(--bg-light); border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; padding-bottom: 20px; margin-bottom: 30px; }
    .hero-panel { display: flex; justify-content: space-between; align-items: center; padding: 40px 0; border-bottom: 1px solid rgba(0,0,0,0.05); margin-bottom: 30px; }
  </style>
</head>
<body>
  <div class="top-section">
    <nav class="navbar-fluid stagger-up d-1">
      <a href="landing.html" class="brand-logotype">
        <div style="width:36px;height:36px;background:var(--black);border-radius:50%;color:var(--white);display:flex;align-items:center;justify-content:center;font-size:1.2rem;">C</div>
        Campus<span>OS</span>
      </a>
      <div style="display:flex; gap:15px; align-items:center;">
        <span class="nav-pill" style="border:none; box-shadow:none; background:transparent;" id="lbl-name">Faculty</span>
        <button class="nav-icon-btn" onclick="document.getElementById('modal-settings').classList.add('open')">⚙</button>
        <button class="nav-pill" onclick="logout()" style="background:var(--black); color:var(--white); box-shadow:none;">Logout</button>
      </div>
    </nav>

    <div class="container stagger-up d-2" style="margin-top:20px;">
      <div class="filter-ribbon">
        <button class="filter-btn active" data-view="overview" onclick="switchView('overview')">Schedule</button>
        <button class="filter-btn" data-view="queries" onclick="switchView('queries')">Student Q&A</button>
        <button class="filter-btn" data-view="attendance" onclick="switchView('attendance')">Registry</button>
        <button class="filter-btn" data-view="blueprint" onclick="switchView('blueprint')">Campus Map</button>
      </div>
    </div>
  </div>

  <div class="container stagger-up d-4">
      <div id="canvas" class="dashboard-canvas"></div>
  </div>

  <!-- Query Reply Modal -->
  <div class="module-modal" id="modal-reply">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal('modal-reply')">✕</button>
      <h2 class="text-headline" style="margin-bottom:30px;">DISPATCH RESPONSE</h2>
      <input type="hidden" id="qr-id">
      
      <div class="thread-msg" style="background:var(--bg-light); border:1px solid rgba(0,0,0,0.05); margin-bottom:20px;">
        <div class="thread-meta" id="qr-meta"></div>
        <div class="thread-body" id="qr-q" style="font-weight:700;"></div>
      </div>
      
      <input id="qr-resp" class="form-input" placeholder="Transmit precise answer..." type="text">
      <button class="massive-btn" onclick="submitReply()">Submit Answer</button>
    </div>
  </div>

  <!-- Attendance Modal -->
  <div class="module-modal" id="modal-att">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal('modal-att')">✕</button>
      <h2 class="text-headline" style="margin-bottom:30px;">LODGE REGISTER</h2>
      <p style="margin-bottom:20px; opacity:0.6;">Use valid system Student ID (e.g. 101, 102)</p>
      
      <input id="att-course" class="form-input" placeholder="Course Code (e.g. CS101)" type="text">
      <input id="att-student" class="form-input" placeholder="Student ID" type="number">
      <select id="att-status" class="form-input">
        <option value="Present">Present</option><option value="Absent">Absent</option>
      </select>
      
      <button class="massive-btn" style="background:var(--black);" onclick="submitAttendance()">Mark Attendance</button>
    </div>
  </div>

  <script>
    const API = '/api';
    let session = null, facultyId = null;

    function openModal(i) { document.getElementById(i).classList.add('open'); }
    function closeModal(i) { document.getElementById(i).classList.remove('open'); }
    function logout() { sessionStorage.clear(); window.location.href='index.html'; }
    async function linkGoogleAccount() {
       const google_email = document.getElementById('link-g-email').value.trim();
       if(!google_email) return;
       const r = await fetch(`${API}/auth/google-link`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id: session.user_id, google_email}) });
       const d = await r.json();
       if(r.ok) { alert('Successfully linked to Google Account: ' + google_email); }
       else { alert('ERROR: ' + d.error); }
    }

    window.onload = async () => {
      session = JSON.parse(sessionStorage.getItem('user') || 'null');
      if (!session || session.role !== 'faculty') { window.location.href = 'index.html'; return; }
      facultyId = session.profile?.faculty_id;
      document.getElementById('lbl-name').textContent = session.name;
      await renderOverview();
    };

    async function switchView(viewName) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-view="${viewName}"]`).classList.add('active');
      const canvas = document.getElementById('canvas');
      canvas.style.opacity = 0;
      setTimeout(async () => {
        if(viewName==='overview') await renderOverview();
        if(viewName==='queries') await renderQueries();
        if(viewName==='attendance') await renderAttendance();
        if(viewName==='blueprint') await renderBlueprint();
        canvas.style.opacity = 1;
      }, 300);
    }

    // 1. Schedule
    async function renderOverview() {
      const html = `<div class="hero-panel"><div><p style="font-weight:600; text-transform:uppercase; opacity:0.5; margin-bottom:10px;">Instructor Mode</p><h1 class="text-headline" style="font-size:3rem;">Master Schedule</h1></div></div>
      <div class="grid-masonry" style="padding:0;">
          <div class="poster-card poster-blue" id="box-tt" style="grid-column: 1/-1; padding:40px;">Loading...</div>
      </div>`;
      document.getElementById('canvas').innerHTML = html;
      try {
         const r = await fetch(`${API}/timetable?section=CS-A`); const data = await r.json();
         const days = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
         let ttMega = '';
         days.forEach(day => {
            const classes = data.filter(x => x.day_of_week === day).sort((a,b)=>a.period_no-b.period_no);
            ttMega += `<div style="margin-top:20px;"><div class="badge" style="background:rgba(255,255,255,0.2); color:#FFF; margin-bottom:10px; display:inline-block;">${day.toUpperCase()}</div>`;
            if(!classes.length) ttMega += `<div class="fluid-row" style="border-bottom-color:rgba(255,255,255,0.2);"><span class="fluid-row-label">No classes</span></div>`;
            classes.forEach(c => ttMega += `<div class="fluid-row" style="border-bottom-color:rgba(255,255,255,0.2);"><span class="fluid-row-label">${c.start_time} - ${c.end_time}</span><span class="fluid-row-val">${c.course_code} (${c.classroom})</span></div>`);
            ttMega += `</div>`;
         });
         document.getElementById('box-tt').innerHTML = `<h3 class="text-headline">Weekly Routine</h3><div style="column-count: 2; column-gap: 40px; margin-top:30px;">${ttMega}</div>`;
      } catch(e){}
    }

    // 2. Q&A 
    async function renderQueries() {
      let html = `<div class="grid-masonry" style="padding:0;"><div class="poster-card" id="box-q" style="grid-column: 1/-1;">Loading...</div></div>`;
      document.getElementById('canvas').innerHTML = html;
      try {
         const r = await fetch(`${API}/queries`); const queries = await r.json();
         const myQ = queries.filter(q => q.faculty_id === facultyId);
         let h = `<div class="poster-header"><h3 class="poster-title text-headline">Student Questions</h3></div><div class="poster-content" style="margin-top:30px;">`;
         if(!myQ.length) h += '<p style="opacity:0.6;">No pending queries.</p>';
         myQ.forEach(q => {
            h += `<div class="fluid-row" style="cursor:pointer;" onclick='replyQuery(${JSON.stringify(q)})'>
               <div style="display:flex; flex-direction:column; gap:5px; max-width:70%;">
                 <span class="fluid-row-val">${q.question}</span><span class="fluid-row-label" style="opacity:0.6;">Course: ${q.course_name}</span>
               </div>
               <span class="badge" style="${q.status==='answered'?'background:var(--neon-green);':'background:var(--purple); color:var(--white);'};">${q.status.toUpperCase()}</span>
            </div>`;
         });
         h += `</div>`; document.getElementById('box-q').innerHTML = h;
      } catch(e){}
    }
    
    function replyQuery(q) {
       document.getElementById('qr-id').value = q.query_id;
       document.getElementById('qr-meta').textContent = `Query concerning ${q.course_name}`;
       document.getElementById('qr-q').textContent = `Q: ${q.question}`;
       document.getElementById('qr-resp').value = q.response || '';
       openModal('modal-reply');
    }
    async function submitReply() {
       const id = document.getElementById('qr-id').value; const resp = document.getElementById('qr-resp').value.trim();
       if(!resp) return;
       const r = await fetch(`${API}/queries/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({response:resp}) });
       if(r.ok){ closeModal('modal-reply'); switchView('queries'); }
    }

    // 3. Attendance Marker
    async function renderAttendance() {
       let html = `<div class="grid-masonry" style="padding:0;"><div class="poster-card poster-green" style="grid-column: 1/-1; min-height:60vh; padding:40px;">
         <div class="poster-header"><h3 class="text-headline">Class Database</h3><button class="nav-pill" style="background:var(--purple); color:var(--white);" onclick="openModal('modal-att')">+ Mark Entry</button></div>
         <div style="margin-top:50px; font-family:var(--font-display); font-size:2.5rem; font-weight:600; opacity:0.5; line-height:1.2;">Use the dispatch button above to lodge attendance entries into the root database.</div>
       </div></div>`;
       document.getElementById('canvas').innerHTML = html;
    }
    
    async function submitAttendance() {
       const body = {
          student_id: document.getElementById('att-student').value,
          course_code: document.getElementById('att-course').value.toUpperCase(),
          date: new Date().toISOString().split('T')[0],
          status: document.getElementById('att-status').value
       };
       const r = await fetch(`${API}/attendance`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
       if(r.ok) { closeModal('modal-att'); document.getElementById('att-student').value=''; } else { alert('Failed.'); }
    }

    // 4. Campus Blueprint
    async function renderBlueprint() {
      let html = `<div class="grid-masonry" style="padding:0;">
        <div class="poster-card poster-light" style="grid-column:1/-1; padding:40px; background:var(--white); color:var(--black); border:var(--border-line);">
           <h2 class="text-headline">CAMPUS BLUEPRINT</h2>
           <div id="bp-preview" style="margin-top:20px; background:rgba(0,0,0,0.02); border-radius:var(--radius-lg); padding:20px; text-align:center;">
              <span style="opacity:0.5;">Loading Map Data...</span>
           </div>
        </div>
      </div>`;
      document.getElementById('canvas').innerHTML = html;
      
      const r = await fetch(`${API}/settings/blueprint`);
      const data = await r.json();
      if(data.blueprint) {
         document.getElementById('bp-preview').innerHTML = `<img src="${data.blueprint}" style="max-width:100%; border-radius:var(--radius-lg); border: 2px solid rgba(0,0,0,0.1);">`;
      } else {
         document.getElementById('bp-preview').innerHTML = `<span style="opacity:0.6;">The internal campus map has not been published yet. Check back later.</span>`;
      }
    }
  </script>

  <!-- Settings Modal -->
  <div class="module-modal" id="modal-settings">
    <div class="modal-content">
      <button class="close-btn" onclick="document.getElementById('modal-settings').classList.remove('open')">✕</button>
      <h2 class="text-headline" style="margin-bottom:30px;">SYSTEM SETTINGS</h2>
      <div class="setting-row">
        <span class="setting-label">Language / भाषा</span>
        <select class="form-input" style="width:200px; margin:0;" id="lang-selector">
           <option value="en">English</option>
           <option value="hi">Hindi / हिंदी</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">External Integrations</span>
        <div style="display:flex; gap:10px; width:100%; margin-top:10px;">
            <input type="email" id="link-g-email" class="form-input" style="margin:0; flex:1;" placeholder="Google Email">
            <button class="nav-pill" style="border-radius:var(--radius-lg);" onclick="linkGoogleAccount()">Bind Account</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
