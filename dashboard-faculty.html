<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Module — OS</title>
  <link rel="stylesheet" href="style.css">
  <style>
  </style>
</head>
<body>
  <div class="cursor-dot" id="cursor-dot"></div><div class="cursor-outline" id="cursor-outline"></div>

  <nav class="navbar-fluid stagger-up d-1">
    <a href="landing.html" class="brand-logotype"><div style="width:36px;height:36px;background:var(--blue);border-radius:50%;color:var(--white);display:flex;align-items:center;justify-content:center;font-size:1.2rem;">S</div> SYSTEM PORTAL</a>
    <div style="display:flex; gap:10px;">
      <span class="nav-pill" style="border:none;" id="lbl-name">Faculty</span>
      <button class="nav-pill nav-icon-btn magnetic" onclick="document.getElementById('modal-settings').classList.add('open')">⚙</button>
      <button class="nav-pill magnetic" onclick="logout()" style="background:var(--black); color:var(--white);">⏻ Logout</button>
    </div>
  </nav>

  <div class="filter-ribbon stagger-up d-2">
    <button class="nav-pill filter-btn active" data-view="overview" onclick="switchView('overview')">Schedule</button>
    <button class="nav-pill filter-btn" data-view="queries" onclick="switchView('queries')">Student Q&A</button>
    <button class="nav-pill filter-btn" data-view="attendance" onclick="switchView('attendance')">Registry</button>
  </div>

  <div class="marquee-wrapper wrapper-blue stagger-up d-3"><div class="marquee-content"><span>● INSTRUCTOR MODE LIVE</span><span>● INSTRUCTOR MODE LIVE</span><span>● INSTRUCTOR MODE LIVE</span><span>● INSTRUCTOR MODE LIVE</span></div></div>

  <div id="canvas" class="dashboard-canvas stagger-up d-4"></div>

  <!-- Query Reply Modal -->
  <div class="module-modal" id="modal-reply">
    <button class="close-btn" onclick="closeModal('modal-reply')">✕</button>
    <div class="container" style="max-width:800px; padding-top:40px;">
      <h2 class="text-headline" style="margin-bottom:40px;">DISPATCH RESPONSE</h2>
      <div class="blob-card b-2">
         <input type="hidden" id="qr-id">
         <div class="thread-msg" style="border-color:rgba(255,255,255,0.2);">
           <div class="thread-meta" id="qr-meta"></div>
           <div class="thread-body" id="qr-q" style="font-weight:700;"></div>
         </div>
         <input id="qr-resp" class="form-input" style="color:var(--white); border-bottom-color:var(--white); margin-top:20px;" placeholder="Transmit precise answer..." type="text">
         <button class="massive-btn" style="background:var(--white); color:var(--black);" onclick="submitReply()">Submit Answer</button>
      </div>
    </div>
  </div>

  <!-- Attendance Modal -->
  <div class="module-modal" id="modal-att">
    <button class="close-btn" onclick="closeModal('modal-att')">✕</button>
    <div class="container" style="max-width:800px; padding-top:40px;">
      <h2 class="text-headline" style="margin-bottom:40px;">LODGE REGISTER</h2>
      <div class="blob-card b-1">
         <p style="margin-bottom:20px;">Use valid system Student ID (e.g. 101, 102)</p>
         <input id="att-course" class="form-input" style="color:var(--white); border-bottom-color:var(--white);" placeholder="Course Code (e.g. CS101)" type="text">
         <input id="att-student" class="form-input" style="color:var(--white); border-bottom-color:var(--white);" placeholder="Student ID" type="number">
         <select id="att-status" class="form-input" style="color:var(--black); background:var(--white);"><option value="Present">Present</option><option value="Absent">Absent</option></select>
         <button class="massive-btn" style="background:var(--black); border-color:var(--black);" onclick="submitAttendance()">Mark Attendance</button>
      </div>
    </div>
  </div>

  <script>
    const API = '/api';
    let session = null, facultyId = null;

    const dot = document.getElementById('cursor-dot'); const outline = document.getElementById('cursor-outline');
    window.addEventListener('mousemove', (e) => { dot.style.left = `${e.clientX}px`; dot.style.top = `${e.clientY}px`; outline.animate({ left: `${e.clientX}px`, top: `${e.clientY}px` }, { duration: 500, fill: "forwards" }); });
    const attachHover = () => { document.querySelectorAll('a, button, input, select, .blob-card, .fluid-row').forEach(el => { el.addEventListener('mouseenter', () => { dot.classList.add('focus'); outline.classList.add('focus'); }); el.addEventListener('mouseleave', () => { dot.classList.remove('focus'); outline.classList.remove('focus'); }); }); };
    
    function openModal(i) { document.getElementById(i).classList.add('open'); } function closeModal(i) { document.getElementById(i).classList.remove('open'); } function logout() { sessionStorage.clear(); window.location.href='index.html'; }

    window.onload = async () => {
      session = JSON.parse(sessionStorage.getItem('user') || 'null');
      if (!session || session.role !== 'faculty') { window.location.href = 'index.html'; return; }
      facultyId = session.profile?.faculty_id;
      document.getElementById('lbl-name').textContent = session.name;
      await renderOverview();
    };

    async function switchView(viewName) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-view="${viewName}"]`).classList.add('active');
      const canvas = document.getElementById('canvas'); canvas.classList.add('canvas-fade');
      setTimeout(async () => {
        if(viewName==='overview') await renderOverview();
        if(viewName==='queries') await renderQueries();
        if(viewName==='attendance') await renderAttendance();
        canvas.classList.remove('canvas-fade'); attachHover();
      }, 400);
    }

    // 1. Schedule (Timetable filter by faculty if desired, otherwise full)
    async function renderOverview() {
      const html = `<div class="hero-panel"><div><p style="font-family:var(--font-display); font-weight:700; text-transform:uppercase;">Instructor Mode</p><h1 class="text-mega">SCHEDULE</h1></div></div>
      <div class="grid-masonry" style="padding:0;">
          <div class="blob-card b-1" id="box-tt" style="grid-column: 1/-1;">Loading...</div>
      </div>`;
      document.getElementById('canvas').innerHTML = html;
      try {
         const r = await fetch(`${API}/timetable?section=CS-A`); const data = await r.json();
         const days = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
         let ttMega = '';
         days.forEach(day => {
            const classes = data.filter(x => x.day_of_week === day).sort((a,b)=>a.period_no-b.period_no);
            ttMega += `<div style="margin-top:20px;"><div class="blob-pill" style="border-color:#FFF; color:#FFF; margin-bottom:10px;">${day.toUpperCase()}</div>`;
            classes.forEach(c => ttMega += `<div class="fluid-row" style="border-bottom-color:rgba(255,255,255,0.2);"><span class="fluid-row-label">${c.start_time} - ${c.end_time}</span><span class="fluid-row-val">${c.course_code} (${c.classroom})</span></div>`);
            ttMega += `</div>`;
         });
         document.getElementById('box-tt').innerHTML = `<div class="text-mega">TME</div><div class="poster-header"><h3 class="text-headline text-headline">Master Routine</h3></div><div style="column-count: 2; column-gap: 40px; margin-top:40px;">${ttMega}</div>`;
      } catch(e){}
    }

    // 2. Q&A 
    async function renderQueries() {
      let html = `<div class="grid-masonry" style="padding:0;"><div class="blob-card b-2" id="box-q" style="grid-column: 1/-1;">Loading...</div></div>`;
      document.getElementById('canvas').innerHTML = html;
      try {
         // Re-using common queries logic for simplicity, fetching all
         const r = await fetch(`${API}/queries`); const queries = await r.json();
         const myQ = queries.filter(q => q.faculty_id === facultyId);
         let h = `<div class="text-mega">Q&A</div><div class="poster-header"><h3 class="text-headline text-headline">Student Questions</h3></div><div class="poster-content">`;
         if(!myQ.length) h += '<p>No pending queries.</p>';
         myQ.forEach(q => {
            h += `<div class="fluid-row" style="cursor:pointer;" onclick='replyQuery(${JSON.stringify(q)})'>
               <div style="display:flex; flex-direction:column; max-width:70%;">
                 <span class="fluid-row-val">${q.question}</span><span class="fluid-row-label" style="opacity:0.6;">Course: ${q.course_name}</span>
               </div>
               <span class="blob-pill" style="border-color:rgba(255,255,255,0.3); color:${q.status==='answered'?'var(--blue)':'#fff'}; align-self:center;">${q.status.toUpperCase()}</span>
            </div>`;
         });
         h += `</div>`; document.getElementById('box-q').innerHTML = h; attachHover();
      } catch(e){}
    }
    
    function replyQuery(q) {
       document.getElementById('qr-id').value = q.query_id;
       document.getElementById('qr-meta').textContent = `Query concerning ${q.course_name}`;
       document.getElementById('qr-q').textContent = `Q: ${q.question}`;
       document.getElementById('qr-resp').value = q.response || '';
       openModal('modal-reply');
    }
    async function submitReply() {
       const id = document.getElementById('qr-id').value; const resp = document.getElementById('qr-resp').value.trim();
       if(!resp) return;
       const r = await fetch(`${API}/queries/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({response:resp}) });
       if(r.ok){ closeModal('modal-reply'); alert('Response sent.'); switchView('queries'); }
    }

    // 3. Attendance Marker
    async function renderAttendance() {
       let html = `<div class="grid-masonry" style="padding:0;"><div class="blob-card" style="grid-column: 1/-1; min-height:60vh;">
         <div class="text-mega" style="opacity:0.04;">REGISTRY</div>
         <div class="poster-header"><h3 class="text-headline text-headline">Class Database</h3><button class="massive-btn" style="width:auto; padding:10px 40px; border-radius:100px;" onclick="openModal('modal-att')">+ Mark Entry</button></div>
         <div style="margin-top:40px; font-family:var(--font-display); font-size:2rem; opacity:0.5;">Use the dispatch button above to lodge attendance entries into the root database.</div>
       </div></div>`;
       document.getElementById('canvas').innerHTML = html; attachHover();
    }
    
    async function submitAttendance() {
       const body = {
          student_id: document.getElementById('att-student').value,
          course_code: document.getElementById('att-course').value.toUpperCase(),
          date: new Date().toISOString().split('T')[0],
          status: document.getElementById('att-status').value
       };
       const r = await fetch(`${API}/attendance`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
       if(r.ok) { alert('Successfully registered.'); closeModal('modal-att'); document.getElementById('att-student').value=''; } else { alert('Failed.'); }
    }
  </script>
  </script>

  <!-- Settings Modal -->
  <div class="module-modal" id="modal-settings">
    <button class="close-btn" onclick="document.getElementById('modal-settings').classList.remove('open')">✕</button>
    <div class="container" style="max-width:600px; padding-top:40px; margin:0 auto;">
      <h2 class="text-headline" style="margin-bottom:40px;">SYSTEM SETTINGS</h2>
      <div class="poster-card poster-dark" style="min-height: auto;">
         <div class="setting-row">
            <span class="setting-label">Language / भाषा</span>
            <select class="form-input lang-selector" style="width:200px; margin:0; border-bottom-color:var(--white); color:var(--white); background:transparent;">
               <option style="color:#000;" value="en">English</option>
               <option style="color:#000;" value="hi">Hindi / हिंदी</option>
               <option style="color:#000;" value="ml">Malayalam / മലയാളം</option>
               <option style="color:#000;" value="te">Telugu / తెలుగు</option>
               <option style="color:#000;" value="bn">Bengali / বাংলা</option>
               <option style="color:#000;" value="gu">Gujarati / ગુજરાતી</option>
            </select>
         </div>
         <div class="setting-row" style="border-bottom:none;">
            <span class="setting-label">Accessibility</span>
            <button class="nav-pill" style="border-color:var(--white); color:var(--white);" onclick="document.body.classList.toggle('color-blind');">Toggle High Contrast</button>
         </div>
      </div>
    </div>
  </div>
</body>
</html>
