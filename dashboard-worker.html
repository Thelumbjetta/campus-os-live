<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker Terminal — OS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background-color: var(--white); }
    .top-section { background: var(--bg-light); border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; padding-bottom: 20px; margin-bottom: 30px; }
    .hero-panel { display: flex; justify-content: space-between; align-items: center; padding: 40px 0; border-bottom: 1px solid rgba(0,0,0,0.05); margin-bottom: 30px; }

    /* Status Stepper */
    .stepper { display: flex; align-items: center; gap: 0; margin: 15px 0; }
    .step { flex: 1; height: 4px; background: rgba(0,0,0,0.08); position: relative; }
    .step.completed { background: var(--neon-green); }
    .step.active { background: var(--purple); }
    .step-label { font-size: 0.7rem; text-align: center; margin-top: 8px; font-weight: 600; text-transform: uppercase; opacity: 0.5; }
    .step-label.active { opacity: 1; color: var(--purple); }
    .step-label.completed { opacity: 0.8; color: green; }
    
    .task-card { border: 1.5px solid rgba(0,0,0,0.07); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 15px; transition: all 0.2s; }
    .task-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); border-color: rgba(0,0,0,0.12); }
    .task-card.critical { border-left: 5px solid #FF4D4D; }
    .task-card.high { border-left: 5px solid #FF8C00; }
    
    .duty-row { padding:16px 20px; border-bottom:1.5px solid rgba(0,0,0,0.05); display:grid; grid-template-columns:80px 1fr auto; gap:15px; align-items:center; }
    .duty-row:last-child { border-bottom:none; }
  </style>
</head>
<body>
  <div class="top-section">
    <nav class="navbar-fluid stagger-up d-1">
      <a href="landing.html" class="brand-logotype">
        <div style="width:36px;height:36px;background:var(--black);border-radius:50%;color:var(--white);display:flex;align-items:center;justify-content:center;font-size:1.2rem;">C</div>
        Campus<span>OS</span>
      </a>
      <div style="display:flex; gap:15px; align-items:center;">
        <span class="nav-pill" style="border:none; box-shadow:none; background:transparent;" id="lbl-name">Worker</span>
        <button class="nav-icon-btn" onclick="document.getElementById('modal-settings').classList.add('open')">⚙</button>
        <button class="nav-pill" onclick="logout()" style="background:var(--black); color:var(--white); box-shadow:none;">Logout</button>
      </div>
    </nav>
    <div class="container stagger-up d-2" style="margin-top:20px;">
      <div class="filter-ribbon">
        <button class="filter-btn active" data-view="tasks" onclick="switchView('tasks')">Assigned Tasks</button>
        <button class="filter-btn" data-view="duties" onclick="switchView('duties')">Duty Schedule</button>
        <button class="filter-btn" data-view="blueprint" onclick="switchView('blueprint')">Campus Map</button>
      </div>
    </div>
  </div>

  <div class="container stagger-up d-4">
    <div id="canvas" class="dashboard-canvas"></div>
  </div>

  <!-- Task Update Modal -->
  <div class="module-modal" id="modal-task">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal('modal-task')">✕</button>
      <h2 class="text-headline" id="tk-title" style="margin-bottom:10px;"></h2>
      
      <!-- Status Stepper -->
      <div id="tk-stepper-wrap" style="margin-bottom:20px;"></div>
      
      <div style="background:var(--bg-light); border-radius:var(--radius-lg); padding:20px; margin-bottom:20px;" id="tk-detail"></div>
      <input type="hidden" id="tk-id">
      
      <label style="font-weight:700; font-size:0.85rem; opacity:0.5; text-transform:uppercase; display:block; margin-bottom:8px;">Update Progress</label>
      <select id="tk-status" class="form-input">
        <option value="assigned">Assigned — Not Started</option>
        <option value="in_progress">In Progress — Working On It</option>
        <option value="resolved">Resolved — Completed</option>
      </select>
      <button class="massive-btn" style="background:var(--black);" onclick="submitTaskUpdate()">Sync Status</button>
    </div>
  </div>

  <script>
    const API = '/api';
    let session = null, workerId = null;

    function openModal(i) { document.getElementById(i).classList.add('open'); }
    function closeModal(i) { document.getElementById(i).classList.remove('open'); }
    function logout() { sessionStorage.clear(); window.location.href='index.html'; }
    async function linkGoogleAccount() {
       const google_email = document.getElementById('link-g-email').value.trim();
       if(!google_email) return;
       const r = await fetch(`${API}/auth/google-link`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id: session.user_id, google_email}) });
       const d = await r.json();
       if(r.ok) { alert('Linked: ' + google_email); } else { alert('ERROR: ' + d.error); }
    }

    window.onload = async () => {
      session = JSON.parse(sessionStorage.getItem('user') || 'null');
      if (!session || session.role !== 'worker') { window.location.href = 'index.html'; return; }
      document.getElementById('lbl-name').textContent = session.name;
      
      // Get worker profile id
      try {
        const workers = await fetch(`${API}/workers`).then(r=>r.json());
        const mine = workers.find(w => w.user_id === session.user_id);
        workerId = mine?.worker_id;
      } catch(e){}
      
      await renderTasks();
    };

    async function switchView(viewName) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-view="${viewName}"]`).classList.add('active');
      const canvas = document.getElementById('canvas');
      canvas.style.opacity = 0;
      setTimeout(async () => {
        if(viewName==='tasks') await renderTasks();
        if(viewName==='duties') await renderDuties();
        if(viewName==='blueprint') await renderBlueprint();
        canvas.style.opacity = 1;
      }, 300);
    }

    // ── 1. ASSIGNED TASKS ────────────────────────────────────────────────────
    async function renderTasks() {
      document.getElementById('canvas').innerHTML = `<div class="poster-card" id="box-tasks" style="padding:40px;">Loading...</div>`;
      try {
        const r = await fetch(`${API}/issues?assigned_id=${session.user_id}`);
        const issues = await r.json();
        
        const active = issues.filter(i => i.status !== 'resolved');
        const done = issues.filter(i => i.status === 'resolved');
        const categories = [...new Set(issues.map(i=>i.category))];
        
        let html = `<div class="poster-header" style="margin-bottom:25px;">
          <h3 class="text-headline" style="font-size:2rem;">My Work Queue</h3>
          <div style="display:flex;gap:8px;">
            <span class="badge" style="background:var(--purple); color:#fff;">${active.length} Active</span>
            <span class="badge" style="background:var(--neon-green); color:#000;">${done.length} Done</span>
          </div>
        </div>`;
        
        // Category filter pills
        if (categories.length > 1) {
          html += `<div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;">
            <span style="font-size:0.8rem; font-weight:700; opacity:0.5; text-transform:uppercase; align-self:center;">Category:</span>
            ${categories.map(c => `<span class="badge" style="background:var(--bg-light); cursor:pointer;">${c.toUpperCase()}</span>`).join('')}
          </div>`;
        }
        
        if (!issues.length) {
          html += '<p style="opacity:0.5; padding:20px 0;">No tasks assigned. All clear!</p>';
        } else {
          active.forEach(i => {
            const stepIdx = {assigned:0, in_progress:1, resolved:2}[i.status] ?? 0;
            const stepperHtml = buildStepper(stepIdx, 'compact');
            html += `<div class="task-card ${i.severity}" onclick='openTaskModal(${JSON.stringify(i).replace(/'/g,"&apos;")})'  style="cursor:pointer;">
              <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:12px;">
                <div>
                  <p style="font-weight:800; font-size:1.05rem; margin-bottom:4px;">${i.title}</p>
                  <p style="opacity:0.5; font-size:0.85rem; margin-bottom:4px;">${i.location} · ${i.category.toUpperCase()}</p>
                  ${i.description ? `<p style="font-size:0.9rem; line-height:1.4;">${i.description}</p>` : ''}
                </div>
                <span class="badge" style="background:${sevBg(i.severity)};color:${i.severity==='medium'?'#000':'#fff'}; flex-shrink:0;">${i.severity.toUpperCase()}</span>
              </div>
              ${stepperHtml}
              <p style="font-size:0.8rem; opacity:0.4; margin-top:10px;">Reported: ${new Date(i.created_at).toLocaleString()}</p>
            </div>`;
          });
          if (done.length) {
            html += `<details style="margin-top:15px; opacity:0.6;"><summary style="cursor:pointer; font-weight:700; font-size:0.85rem; text-transform:uppercase; padding:10px 0;">Completed Tasks (${done.length})</summary>`;
            done.forEach(i => {
              html += `<div class="task-card" style="cursor:default;">
                <div style="display:flex; justify-content:space-between;">
                  <div><p style="font-weight:700;">${i.title}</p><p style="opacity:0.5; font-size:0.85rem;">${i.location}</p></div>
                  <span class="badge" style="background:green; color:#fff;">RESOLVED</span>
                </div>
              </div>`;
            });
            html += `</details>`;
          }
        }
        document.getElementById('box-tasks').innerHTML = html;
      } catch(e) { document.getElementById('box-tasks').innerHTML = '<p style="color:red;">Error loading tasks.</p>'; }
    }

    function sevBg(s) { return {critical:'#FF4D4D',high:'#FF8C00',medium:'#FFB800',low:'#888'}[s]||'#ccc'; }

    function buildStepper(activeIdx, mode='full') {
      const steps = ['ASSIGNED','IN PROGRESS','RESOLVED'];
      let h = '<div class="stepper">';
      steps.forEach((s, i) => {
        const cls = i < activeIdx ? 'completed' : (i === activeIdx ? 'active' : '');
        h += `<div class="step ${cls}"></div>`;
      });
      h += '</div><div style="display:flex;">';
      steps.forEach((s, i) => {
        const cls = i < activeIdx ? 'completed' : (i === activeIdx ? 'active' : '');
        h += `<div class="step-label ${cls}" style="flex:1;">${s}</div>`;
      });
      h += '</div>';
      return h;
    }

    function openTaskModal(issue) {
      document.getElementById('tk-id').value = issue.issue_id;
      document.getElementById('tk-title').textContent = issue.title;
      document.getElementById('tk-status').value = issue.status;
      document.getElementById('tk-detail').innerHTML = `
        <p style="font-size:0.8rem; opacity:0.5; text-transform:uppercase; margin-bottom:4px;">Location</p>
        <p style="font-weight:700; margin-bottom:12px;">${issue.location}</p>
        <p style="font-size:0.8rem; opacity:0.5; text-transform:uppercase; margin-bottom:4px;">Description</p>
        <p>${issue.description || '—'}</p>`;
      const stepIdx = {assigned:0, in_progress:1, resolved:2}[issue.status] ?? 0;
      document.getElementById('tk-stepper-wrap').innerHTML = buildStepper(stepIdx);
      openModal('modal-task');
    }

    async function submitTaskUpdate() {
      const id = document.getElementById('tk-id').value;
      const status = document.getElementById('tk-status').value;
      const r = await fetch(`${API}/issues/${id}/status`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status}) });
      if(r.ok){ closeModal('modal-task'); renderTasks(); }
    }

    // ── 2. DUTY SCHEDULE ─────────────────────────────────────────────────────
    async function renderDuties() {
      document.getElementById('canvas').innerHTML = `<div class="poster-card" id="box-duties" style="padding:40px;">Loading duties...</div>`;
      try {
        const r = await fetch(`${API}/worker-duties${workerId?'?worker_id='+workerId:''}`);
        const duties = await r.json();
        const today = new Date().toISOString().split('T')[0];
        
        let html = `<div class="poster-header" style="margin-bottom:25px;">
          <h3 class="text-headline" style="font-size:2rem;">Duty Schedule</h3>
          <span class="badge" style="background:var(--bg-light);">${duties.length} Duties</span>
        </div>`;
        
        if (!duties.length) {
          html += '<p style="opacity:0.5;">No duties scheduled yet.</p>';
        } else {
          // Group by date
          const grouped = {};
          duties.forEach(d => {
            if (!grouped[d.duty_date]) grouped[d.duty_date] = [];
            grouped[d.duty_date].push(d);
          });
          
          Object.keys(grouped).sort().forEach(date => {
            const isToday = date === today;
            html += `<div style="margin-bottom:20px; border:1.5px solid ${isToday?'var(--neon-green)':'rgba(0,0,0,0.07)'}; border-radius:var(--radius-lg); overflow:hidden;">
              <div style="background:${isToday?'var(--neon-green)':'var(--bg-light)'}; padding:12px 20px; font-weight:700; display:flex; justify-content:space-between; align-items:center;">
                <span>${isToday?'● TODAY — ':''}${new Date(date+'T12:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}</span>
                <span style="font-size:0.8rem; opacity:0.6;">${grouped[date].length} duties</span>
              </div>`;
            grouped[date].forEach(d => {
              const isDone = d.status === 'completed';
              html += `<div class="duty-row" style="${isDone?'opacity:0.6;':''}">  
                <div style="text-align:center; background:var(--bg-light); padding:10px; border-radius:10px;">
                  <div style="font-family:var(--font-display); font-size:1.2rem; font-weight:800;">${d.shift_start}</div>
                  <div style="font-size:0.7rem; opacity:0.5;">to ${d.shift_end}</div>
                </div>
                <div>
                  <p style="font-weight:700;">${d.task}</p>
                  <p style="opacity:0.5; font-size:0.85rem;">${d.location || ''}</p>
                </div>
                <span class="badge" style="background:${isDone?'var(--neon-green)':'var(--bg-light)'}; color:${isDone?'#000':'inherit'};">${isDone?'DONE':'PENDING'}</span>
              </div>`;
            });
            html += `</div>`;
          });
        }
        document.getElementById('box-duties').innerHTML = html;
      } catch(e) { document.getElementById('box-duties').innerHTML = '<p style="color:red;">Error loading duties.</p>'; }
    }

    // ── 3. CAMPUS BLUEPRINT ──────────────────────────────────────────────────
    async function renderBlueprint() {
      document.getElementById('canvas').innerHTML = `<div class="poster-card" style="padding:40px;"><h2 class="text-headline">CAMPUS BLUEPRINT</h2><div id="bp-preview" style="margin-top:20px; text-align:center;"><span style="opacity:0.5;">Loading...</span></div></div>`;
      const r = await fetch(`${API}/settings/blueprint`);
      const data = await r.json();
      if(data.blueprint) document.getElementById('bp-preview').innerHTML = `<img src="${data.blueprint}" style="max-width:100%; border-radius:var(--radius-lg);">`;
      else document.getElementById('bp-preview').innerHTML = `<span style="opacity:0.5;">Campus map not published.</span>`;
    }
  </script>

  <!-- Settings Modal -->
  <div class="module-modal" id="modal-settings">
    <div class="modal-content">
      <button class="close-btn" onclick="document.getElementById('modal-settings').classList.remove('open')">✕</button>
      <h2 class="text-headline" style="margin-bottom:30px;">SYSTEM SETTINGS</h2>
      <div class="setting-row">
        <span class="setting-label">External Integrations</span>
        <div style="display:flex; gap:10px; width:100%; margin-top:10px;">
            <input type="email" id="link-g-email" class="form-input" style="margin:0; flex:1;" placeholder="Google Email">
            <button class="nav-pill" onclick="linkGoogleAccount()">Bind Account</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
