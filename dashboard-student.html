<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Terminal — OS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Dashboard specific overrides */
    body { background-color: var(--white); }
    .top-section { background: var(--bg-light); border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; padding-bottom: 20px; margin-bottom: 30px; }
    .hero-panel { display: flex; justify-content: space-between; align-items: center; padding: 40px 0; border-bottom: 1px solid rgba(0,0,0,0.05); margin-bottom: 30px; }
  </style>
</head>
<body>
  <script src="translations.js"></script>

  <div class="top-section">
    <!-- Navbar -->
    <nav class="navbar-fluid stagger-up d-1">
      <a href="landing.html" class="brand-logotype">
        <div style="width:36px;height:36px;background:var(--black);border-radius:50%;color:var(--white);display:flex;align-items:center;justify-content:center;font-size:1.2rem;">S</div>
        <span data-i18n="app_sys">CampusOS</span>
      </a>
      
      <div class="nav-links" style="display:none;"></div> <!-- hidden on dashboards usually -->

      <div style="display:flex; gap:15px; align-items:center;">
        <span class="nav-pill" style="border:none; box-shadow:none; background:transparent;" id="lbl-name">User</span>
        <button class="nav-icon-btn" onclick="document.getElementById('modal-settings').classList.add('open')">⚙</button>
        <button class="nav-pill" onclick="logout()" style="background:var(--black); color:var(--white); box-shadow:none;" data-i18n="logout">Logout</button>
      </div>
    </nav>

    <!-- Filters -->
    <div class="container stagger-up d-2" style="margin-top:20px;">
        <div class="filter-ribbon">
          <button class="filter-btn active" data-view="overview" onclick="switchView('overview')" data-i18n="overview">Overview</button>
          <button class="filter-btn" data-view="analytics" onclick="switchView('analytics')" data-i18n="analytics">Analytics</button>
          <button class="filter-btn" data-view="issues" onclick="switchView('issues')">Live Issues</button>
          <button class="filter-btn" data-view="forum" onclick="switchView('forum')">Public Forum</button>
          <button class="filter-btn" data-view="blueprint" onclick="switchView('blueprint')">Campus Map</button>
        </div>
    </div>
  </div>

  <!-- Dynamic Canvas Content -->
  <div class="container stagger-up d-4">
      <div id="canvas" class="dashboard-canvas"></div>
  </div>

  <!-- MODALS -->
  <!-- 1. Issue Ticket Modal -->
  <div class="module-modal" id="modal-issue">
    <div class="modal-content" style="max-width:800px;">
      <button class="close-btn" onclick="closeModal('modal-issue')">✕</button>
      <h2 class="text-headline" style="margin-bottom:30px;">SUBMIT TICKET</h2>
      <div class="camera-box">
        <video id="cam-video" style="width:100%; border-radius:var(--radius-lg); display:none;" autoplay playsinline></video>
        <canvas id="cam-canvas" style="display:none;"></canvas>
        <img id="cap-img" style="width:100%; border-radius:var(--radius-lg); display:none; margin-bottom:15px;">
        <div style="display:flex; gap:10px; z-index:2;">
           <button class="massive-btn" id="btn-openCam" onclick="openCamera()" style="font-size:1rem; padding:10px 20px;">Open Camera</button>
           <button class="massive-btn" id="btn-capture" onclick="capturePhoto()" style="font-size:1rem; padding:10px 20px; display:none;">Capture</button>
           <button class="massive-btn" id="btn-stopCam" onclick="stopCamera()" style="font-size:1rem; padding:10px 20px; background:var(--black); border-color:var(--black); display:none;">Stop</button>
        </div>
      </div>
      <input id="ir-title" class="form-input" placeholder="Title (e.g. Broken AC)" type="text">
      <div style="display:flex; gap:20px;">
        <select id="ir-category" class="form-input"><option value="maintenance">Maintenance</option><option value="security">Security</option><option value="cleanliness">Cleanliness</option></select>
        <select id="ir-severity" class="form-input"><option value="low">Low</option><option value="high">High</option><option value="critical">Critical</option></select>
      </div>
      <input id="ir-location" class="form-input" placeholder="Location (e.g. Lab 3)" type="text">
      <input id="ir-desc" class="form-input" placeholder="Detailed Description..." type="text">
      <button class="massive-btn" onclick="submitIssue()">Submit Request</button>
    </div>
  </div>

  <!-- 2. Faculty Query Modal -->
  <div class="module-modal" id="modal-query">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal('modal-query')">✕</button>
      <h2 class="text-headline" style="margin-bottom:30px;">QUERY FACULTY</h2>
      <select id="q-course" class="form-input"><option value="">Select Course...</option></select>
      <select id="q-faculty" class="form-input">
        <option value="1">Dr. Ramesh Nair</option><option value="2">Prof. Anita Joshi</option><option value="3">Dr. Vijay Patil</option>
      </select>
      <input id="q-question" class="form-input" placeholder="What is your doubt?" type="text">
      <button class="massive-btn" onclick="submitQuery()">Send Message</button>
    </div>
  </div>

  <!-- 3. New Public Thread Modal -->
  <div class="module-modal" id="modal-forum-new">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal('modal-forum-new')">✕</button>
      <h2 class="text-headline" style="margin-bottom:30px;">START FREQUENCY</h2>
      <input id="pf-title" class="form-input" placeholder="Broadcast Title..." type="text">
      <input id="pf-content" class="form-input" placeholder="Message the campus..." type="text">
      <button class="massive-btn" style="background:var(--black);" onclick="submitPublicQuery()">Broadcast &rarr;</button>
    </div>
  </div>

  <!-- 4. View Thread Modal -->
  <div class="module-modal" id="modal-forum-view">
    <div class="modal-content" style="max-width:800px; display:flex; flex-direction:column; max-height:90vh;">
      <button class="close-btn" onclick="closeModal('modal-forum-view')">✕</button>
      <h2 class="text-headline" id="fv-title" style="margin-bottom:10px;">THREAD</h2>
      <div id="fv-meta" style="font-size:0.9rem; font-weight:600; opacity:0.6; margin-bottom:20px; text-transform:uppercase;">Loading...</div>
      
      <div class="poster-card poster-dark" style="margin-bottom:30px; padding:20px;">
         <div id="fv-content" class="thread-body"></div>
      </div>
      
      <div style="font-family:var(--font-display); font-size:1.5rem; font-weight:700; margin-bottom:15px;">COMMUNICATIONS</div>
      <div id="fv-replies" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:15px; margin-bottom:20px; padding-right:10px;"></div>
      
      <div style="margin-top:auto;">
         <input type="hidden" id="fv-pqid">
         <input id="fv-reply-content" class="form-input" placeholder="Transmit reply..." type="text">
         <button class="massive-btn" onclick="submitReply()">Transmit</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="module-modal" id="modal-settings">
    <div class="modal-content">
      <button class="close-btn" onclick="document.getElementById('modal-settings').classList.remove('open')">✕</button>
      <h2 class="text-headline" style="margin-bottom:30px;">SYSTEM SETTINGS</h2>
      <div class="setting-row">
        <span class="setting-label">Language / भाषा</span>
        <select class="form-input" style="width:200px; margin:0;" id="lang-selector">
           <option value="en">English</option>
           <option value="hi">Hindi / हिंदी</option>
           <option value="ml">Malayalam / മലയാളം</option>
           <option value="te">Telugu / తెలుగు</option>
           <option value="bn">Bengali / বাংলা</option>
           <option value="gu">Gujarati / ગુજરાતી</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">External Integrations</span>
        <div style="display:flex; gap:10px; width:100%; margin-top:10px;">
            <input type="email" id="link-g-email" class="form-input" style="margin:0; flex:1;" placeholder="Google Email">
            <button class="nav-pill" style="border-radius:var(--radius-lg);" onclick="linkGoogleAccount()">Bind Account</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Core App Logic -->
  <script>
    const API = '/api';
    let session = null, studentId = null;
    let cameraStream = null, capturedImageData = null;
    let cachedTimetable = [], cachedAttendance = [], cachedNotices = [];

    // --- Cursor logic removed for cleaner UI flow aligning with reference ---

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
    async function linkGoogleAccount() {
       const google_email = document.getElementById('link-g-email').value.trim();
       if(!google_email) return;
       const r = await fetch(`${API}/auth/google-link`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id: session.user_id, google_email}) });
       const d = await r.json();
       if(r.ok) { alert('Successfully linked to Google Account: ' + google_email); }
       else { alert('ERROR: ' + d.error); }
    }

    // --- Boot Sequence ---
    window.onload = async () => {
      session = JSON.parse(sessionStorage.getItem('user') || 'null');
      if (!session || session.role !== 'student') { window.location.href = 'index.html'; return; }
      studentId = session.profile?.student_id;
      document.getElementById('lbl-name').textContent = session.name;
      
      loadCourses();
      await prefetchBaseData();
      await renderOverview();
    };

    async function loadCourses() {
      try {
        const r = await fetch(`${API}/courses`); const c = await r.json();
        document.getElementById('q-course').innerHTML = '<option value="">Select course…</option>' + c.map(x => `<option value="${x.course_id}">${x.course_code}</option>`).join('');
      } catch(e) {}
    }

    async function prefetchBaseData() {
      try {
        const [tt, att, nots] = await Promise.all([
           fetch(`${API}/timetable?section=CS-A`).then(r=>r.json()),
           fetch(`${API}/attendance/summary/${studentId}`).then(r=>r.json()),
           fetch(`${API}/notices?role=student`).then(r=>r.json())
        ]);
        cachedTimetable = tt; cachedAttendance = att; cachedNotices = nots;
      } catch(e) { console.error('Prefetch failed'); }
    }

    async function switchView(viewName) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-view="${viewName}"]`).classList.add('active');
      
      const canvas = document.getElementById('canvas');
      canvas.style.opacity = 0;
      
      setTimeout(async () => {
        if(viewName==='overview') await renderOverview();
        else if(viewName==='analytics') await renderAnalytics();
        else if(viewName==='issues') await renderReports();
        else if(viewName==='forum') await renderComms();
        else if(viewName==='blueprint') await renderBlueprint();
        
        canvas.style.opacity = 1;
      }, 300);
    }

    /* ── 1. RENDER OVERVIEW ────────────────────── */
    async function renderOverview() {
      const todayStr = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];
      const todayClasses = cachedTimetable.filter(x => x.day_of_week === todayStr).sort((a,b)=>a.period_no-b.period_no);
      
      let attHtml = '';
      cachedAttendance.slice(0,4).forEach(c => {
         const pct = c.total ? Math.round(100*c.present/c.total) : 0;
         attHtml += `<div class="fluid-row"><span class="fluid-row-label">${c.course_code}</span><span class="fluid-row-val" style="color:${pct<75?'var(--neon-green)':'var(--white)'}">${pct}%</span></div>`;
      });

      let ttHtml = `<div class="badge" style="background:var(--bg-light); color:var(--black); margin-bottom:15px; display:inline-block;">${todayStr.toUpperCase()}</div>`;
      if(!todayClasses.length) ttHtml += `<p class="text-headline">FREE DAY</p>`;
      else todayClasses.forEach(c => ttHtml += `<div class="fluid-row"><span class="fluid-row-label">${c.start_time} - ${c.end_time}</span><span class="fluid-row-val">${c.course_code}</span></div>`);

      let notHtml = '';
      cachedNotices.slice(0,3).forEach(n => notHtml += `<div class="fluid-row" style="flex-direction:column; align-items:flex-start; gap:5px;"><span class="fluid-row-val">${n.title}</span><span class="fluid-row-label" style="opacity:0.6; font-size:0.8rem;">${new Date(n.date_posted).toLocaleDateString()}</span></div>`);

      const html = `
        <div class="hero-panel">
          <div>
            <p style="font-weight:600; text-transform:uppercase; opacity:0.5; margin-bottom:10px;" data-i18n="terminal_acc">Terminal Access</p>
            <h1 class="text-headline" style="font-size:3rem;" data-i18n="dashboard">Student Dashboard</h1>
          </div>
          <div><button class="nav-pill" style="border-radius:var(--radius-pill); font-size:1.1rem; padding:15px 30px;" onclick="switchView('analytics')">View Analytics &rarr;</button></div>
        </div>
        <div class="grid-masonry" style="padding:0;">
          <div class="poster-card poster-dark"><div class="poster-header"><h3 class="poster-title">Attendance</h3><div class="poster-icon">📊</div></div><div class="poster-content">${attHtml||'No data.'}</div></div>
          <div class="poster-card poster-green"><div class="poster-header"><h3 class="poster-title">Schedule</h3><div class="poster-icon" style="background:var(--white);">⏰</div></div><div class="poster-content">${ttHtml}</div></div>
          <div class="poster-card"><div class="poster-header"><h3 class="poster-title">Broadcasts</h3><div class="poster-icon" style="background:var(--purple); color:var(--white);">📢</div></div><div class="poster-content">${notHtml||'No broadcasts.'}</div></div>
        </div>
      `;
      document.getElementById('canvas').innerHTML = html;
      window.applyLanguage(localStorage.getItem('os_lang') || 'en');
    }

    /* ── 2. RENDER ANALYTICS (Full Timetable) ───── */
    async function renderAnalytics() {
      const days = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
      let ttMega = '';
      days.forEach(day => {
         const classes = cachedTimetable.filter(x => x.day_of_week === day).sort((a,b)=>a.period_no-b.period_no);
         ttMega += `<div style="margin-top:20px;"><div class="badge" style="background:rgba(255,255,255,0.2); color:var(--white); margin-bottom:10px; display:inline-block;">${day.toUpperCase()}</div>`;
         if(!classes.length) ttMega += `<div class="fluid-row"><span class="fluid-row-label">No classes mapped</span></div>`;
         else classes.forEach(c => ttMega += `<div class="fluid-row"><span class="fluid-row-label">${c.start_time} - ${c.end_time}</span><span class="fluid-row-val">${c.course_code}</span></div>`);
         ttMega += `</div>`;
      });
      
      let attMega = '';
      cachedAttendance.forEach(c => {
         const pct = c.total ? Math.round(100*c.present/c.total) : 0;
         attMega += `<div class="fluid-row"><span class="fluid-row-label">${c.course_code}<br><span style="opacity:0.6;font-size:0.8rem;">P:${c.present} A:${c.absent} L:${c.late}</span></span><span class="text-headline" style="color:${pct<75?'var(--neon-green)':'var(--white)'}; font-size:2.5rem;">${pct}%</span></div>`;
      });

      const html = `
        <div class="grid-masonry" style="padding:0;">
          <div class="poster-card poster-blue" style="grid-column: 1 / -1; min-height:200px; padding:40px;">
             <h2 class="text-headline">FULL TIMETABLE</h2>
             <div style="column-count: 2; column-gap: 40px; margin-top:30px;">${ttMega}</div>
          </div>
          <div class="poster-card poster-dark" style="grid-column: 1 / -1; padding:40px;">
             <h2 class="text-headline">ATTENDANCE REPORT</h2>
             <div style="margin-top:30px;">${attMega||'<p>No attendance data linked.</p>'}</div>
          </div>
        </div>
      `;
      document.getElementById('canvas').innerHTML = html;
      window.applyLanguage(localStorage.getItem('os_lang') || 'en');
    }

    /* ── 3. RENDER COMMS (Forum & Queries) ──────── */
    async function renderComms() {
      let fHtml = '<div class="loading">Loading forum...</div>';
      let qHtml = '<div class="loading">Loading queries...</div>';
      document.getElementById('canvas').innerHTML = `
        <div class="grid-masonry" style="padding:0;">
          <div class="poster-card" id="box-forum" style="grid-column: 1/-1;">${fHtml}</div>
          <div class="poster-card poster-green" id="box-query" style="grid-column: 1/-1;">${qHtml}</div>
        </div>
      `;
      
      try {
         const r = await fetch(`${API}/public-queries`); const threads = await r.json();
         let html = `<div class="poster-header"><h2 class="text-headline" style="font-size:2rem;">PUBLIC FREQUENCIES</h2><button class="nav-pill" style="background:var(--purple); color:var(--white);" onclick="openModal('modal-forum-new')">+ Broadcast</button></div><div class="poster-content" style="margin-top:30px;">`;
         threads.forEach(t => {
            html += `<div class="fluid-row" onclick='openThread(${t.pq_id}, ${JSON.stringify(t)})' style="cursor:pointer;">
               <div style="display:flex; flex-direction:column; gap:5px;">
                 <span class="fluid-row-val" style="font-size:1.2rem;">${t.title}</span><span class="fluid-row-label">By ${t.student_name} · ${new Date(t.created_at).toLocaleDateString()}</span>
               </div>
               <span class="badge" style="background:var(--bg-light);">Replies: ${t.replies_count}</span>
            </div>`;
         });
         html += `</div>`;
         document.getElementById('box-forum').innerHTML = html;
      } catch(e) { document.getElementById('box-forum').innerHTML = '<h2 class="text-headline">ERROR</h2>'; }

      try {
         const r = await fetch(`${API}/queries?student_id=${studentId}`); const queries = await r.json();
         let html = `<div class="poster-header"><h2 class="text-headline" style="font-size:2rem;">FACULTY QUERIES</h2><button class="nav-pill" style="background:var(--white); color:var(--black);" onclick="openModal('modal-query')">+ Dispatch</button></div><div class="poster-content" style="margin-top:30px;">`;
         queries.forEach(q => {
            html += `<div class="thread-msg" style="background:var(--white); border-color:transparent;">
               <div class="thread-meta"><span>${q.course_name} (To ${q.faculty_name})</span><span class="badge" style="background:${q.status==='answered'?'var(--purple)':'#FFD166'}; color:${q.status==='answered'?'var(--white)':'var(--black)'};">${q.status.toUpperCase()}</span></div>
               <div class="thread-body" style="font-weight:600;">Q: ${q.question}</div>
               <div class="thread-body" style="margin-top:10px; font-size:0.95rem; border-top:1px dashed rgba(0,0,0,0.1); padding-top:10px;">A: ${q.response || 'Pending integration...'}</div>
            </div>`;
         });
         html += `</div>`;
         document.getElementById('box-query').innerHTML = html;
      } catch(e) { document.getElementById('box-query').innerHTML = '<h2 class="text-headline">ERROR</h2>'; }
    }

    /* ── 4. RENDER REPORTS (Tickets & Camera) ───── */
    async function renderReports() {
      document.getElementById('canvas').innerHTML = `
        <div class="grid-masonry" style="padding:0;">
          <div class="poster-card" id="box-issues" style="grid-column: 1/-1;">Loading tickets...</div>
        </div>
      `;
      try {
         const r = await fetch(`${API}/issues?student_id=${studentId}`); const issues = await r.json();
         let html = `<div class="poster-header"><h2 class="text-headline" style="font-size:2rem;">CAMPUS TICKETS</h2><button class="massive-btn" style="width:auto; padding:10px 30px;" onclick="openModal('modal-issue')">+ Create Ticket</button></div><div class="poster-content" style="margin-top:30px;">`;
         issues.forEach(i => {
           html += `<div class="fluid-row">
             <div style="display:flex; flex-direction:column; gap:5px;">
               <span class="fluid-row-val">${i.title}</span><span class="fluid-row-label">${i.category.toUpperCase()} · ${i.location}</span>
             </div>
             <span class="badge" style="${i.status==='resolved'?'background:var(--neon-green);':'background:var(--purple); color:var(--white);'}">${i.status.toUpperCase()}</span>
           </div>`;
         });
         html += `</div>`;
         document.getElementById('box-issues').innerHTML = html;
      } catch(e) { document.getElementById('box-issues').innerHTML = '<h2 class="text-headline">ERROR</h2>'; }
    }

    // 6. Campus Map Blueprint
    async function renderBlueprint() {
      let html = `<div class="grid-masonry" style="padding:0;">
        <div class="poster-card poster-blue" style="grid-column:1/-1; padding:40px;">
           <h2 class="text-headline">CAMPUS BLUEPRINT</h2>
           <div id="bp-preview" style="margin-top:20px; background:rgba(255,255,255,0.05); border-radius:var(--radius-lg); padding:20px; text-align:center;">
              <span style="opacity:0.5;">Loading Map Data...</span>
           </div>
        </div>
      </div>`;
      document.getElementById('canvas').innerHTML = html;
      
      const r = await fetch(`${API}/settings/blueprint`);
      const data = await r.json();
      if(data.blueprint) {
         document.getElementById('bp-preview').innerHTML = `<img src="${data.blueprint}" style="max-width:100%; border-radius:var(--radius-lg); border: 2px solid rgba(255,255,255,0.1);">`;
      } else {
         document.getElementById('bp-preview').innerHTML = `<span style="opacity:0.6;">The internal campus map has not been published yet. Check back later.</span>`;
      }
    }

    async function submitPublicQuery() {
      const title = document.getElementById('pf-title').value.trim();
      const content = document.getElementById('pf-content').value.trim();
      const r = await fetch(`${API}/public-queries`, { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ student_id: studentId, title, content }) });
      if (r.ok) { closeModal('modal-forum-new'); renderComms(); }
    }
    async function openThread(id, threadData) {
      document.getElementById('fv-title').textContent = threadData.title;
      document.getElementById('fv-meta').textContent = `Transmitted by ${threadData.student_name} · ${new Date(threadData.created_at).toLocaleDateString()}`;
      document.getElementById('fv-content').textContent = threadData.content;
      document.getElementById('fv-pqid').value = id;
      openModal('modal-forum-view');
      try {
        const r = await fetch(`${API}/public-queries/${id}/replies`); const replies = await r.json();
        const repDiv = document.getElementById('fv-replies');
        repDiv.innerHTML = replies.map(rep => `<div class="thread-msg"><div class="thread-meta"><span>${rep.student_name}</span><span>${new Date(rep.created_at).toLocaleDateString()}</span></div><div class="thread-body">${rep.content}</div></div>`).join('');
      } catch(e) {}
    }
    async function submitReply() {
      const pq_id = document.getElementById('fv-pqid').value;
      const content = document.getElementById('fv-reply-content').value.trim();
      if(!content) return;
      const r = await fetch(`${API}/public-queries/${pq_id}/replies`, { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ student_id: studentId, content }) });
      if (r.ok) { document.getElementById('fv-reply-content').value = ''; switchView('comms'); closeModal('modal-forum-view'); }
    }
    async function submitQuery() {
      const body = { student_id: studentId, faculty_id: parseInt(document.getElementById('q-faculty').value), course_id: parseInt(document.getElementById('q-course').value), question: document.getElementById('q-question').value.trim() };
      const r = await fetch(`${API}/queries`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if (r.ok) { closeModal('modal-query'); renderComms(); }
    }

    async function openCamera() {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'environment' } });
        document.getElementById('cam-video').srcObject = cameraStream;
        document.getElementById('cam-video').style.display = 'block';
        document.getElementById('btn-openCam').style.display = 'none';
        document.getElementById('btn-capture').style.display = 'block';
        document.getElementById('btn-stopCam').style.display = 'block';
        capturedImageData = null;
      } catch(e) { alert('Camera access denied'); }
    }
    function capturePhoto() {
      const v = document.getElementById('cam-video'); const c = document.getElementById('cam-canvas');
      c.width = v.videoWidth; c.height = v.videoHeight; c.getContext('2d').drawImage(v,0,0);
      capturedImageData = c.toDataURL('image/jpeg', 0.75);
      document.getElementById('cap-img').src = capturedImageData; document.getElementById('cap-img').style.display = 'block';
      stopCamera();
    }
    function stopCamera() {
      if (cameraStream) { cameraStream.getTracks().forEach(t=>t.stop()); cameraStream = null; }
      document.getElementById('cam-video').style.display = 'none';
      document.getElementById('btn-openCam').style.display = 'block';
      document.getElementById('btn-capture').style.display = 'none';
      document.getElementById('btn-stopCam').style.display = 'none';
    }
    async function submitIssue() {
      const body = {
        student_id: studentId, title: document.getElementById('ir-title').value.trim(), description: document.getElementById('ir-desc').value.trim(),
        location: document.getElementById('ir-location').value.trim(), category: document.getElementById('ir-category').value, severity: document.getElementById('ir-severity').value,
        image_data: capturedImageData || null
      };
      if (!body.title) return;
      const r = await fetch(`${API}/issues`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if (r.ok) { closeModal('modal-issue'); renderReports(); }
    }
  </script>
</body>
</html>
