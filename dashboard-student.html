<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Terminal — OS</title>
  <link rel="stylesheet" href="style.css">
  <style>
  </style>
</head>
<body>
  <script src="translations.js"></script>
  <div class="cursor-dot" id="cursor-dot"></div>
  <div class="cursor-outline" id="cursor-outline"></div>

  <!-- Navbar & Filters -->
  <nav class="navbar-fluid stagger-up d-1">
    <a href="landing.html" class="brand-logotype">
      <div style="width:36px;height:36px;background:var(--blue);border-radius:50%;color:var(--white);display:flex;align-items:center;justify-content:center;font-size:1.2rem;">S</div>
      <span data-i18n="app_sys">SYSTEM PORTAL</span>
    </a>
    <div style="display:flex; gap:10px; align-items:center;">
      <span class="nav-pill" style="border:none;" id="lbl-name">User</span>
      <button class="nav-pill nav-icon-btn magnetic" onclick="document.getElementById('modal-settings').classList.add('open')">⚙</button>
      <button class="nav-pill magnetic" onclick="logout()" style="background:var(--black); color:var(--white);" data-i18n="logout">⏻ Logout</button>
    </div>
  </nav>

  <div class="filter-ribbon stagger-up d-2">
    <button class="nav-pill filter-btn active" data-view="overview" onclick="switchView('overview')" data-i18n="overview">Overview</button>
    <button class="nav-pill filter-btn" data-view="analytics" onclick="switchView('analytics')" data-i18n="analytics">Analytics</button>
    <button class="nav-pill filter-btn" data-view="comms" onclick="switchView('comms')" data-i18n="comms">Comms & Forum</button>
    <button class="nav-pill filter-btn" data-view="reports" onclick="switchView('reports')" data-i18n="tickets">Campus Tickets</button>
  </div>

  <div class="marquee-wrapper stagger-up d-3">
    <div class="marquee-content">
      <span>● LIVE DATA STREAM</span><span>● LIVE DATA STREAM</span><span>● LIVE DATA STREAM</span><span>● LIVE DATA STREAM</span><span>● LIVE DATA STREAM</span>
    </div>
  </div>

  <!-- Dynamic Canvas Content -->
  <div id="canvas" class="dashboard-canvas stagger-up d-4"></div>

  <!-- MODALS -->
  <!-- 1. Issue Ticket Modal -->
  <div class="module-modal" id="modal-issue">
    <button class="close-btn" onclick="closeModal('modal-issue')">✕</button>
    <div class="container" style="max-width:800px; padding-top:40px;">
      <h2 class="text-headline" style="margin-bottom:40px;">SUBMIT TICKET</h2>
      <div class="blob-card">
         <div class="camera-box">
            <video id="cam-video" style="width:100%; border-radius:8px; display:none;" autoplay playsinline></video>
            <canvas id="cam-canvas" style="display:none;"></canvas>
            <img id="cap-img" style="width:100%; border-radius:8px; display:none; margin-bottom:15px;">
            <div style="display:flex; gap:10px; z-index:2;">
               <button class="massive-btn" id="btn-openCam" onclick="openCamera()" style="font-size:1rem; padding:10px 20px;">Open Camera</button>
               <button class="massive-btn" id="btn-capture" onclick="capturePhoto()" style="font-size:1rem; padding:10px 20px; display:none;">Capture</button>
               <button class="massive-btn" id="btn-stopCam" onclick="stopCamera()" style="font-size:1rem; padding:10px 20px; background:var(--black); border-color:var(--black); display:none;">Stop</button>
            </div>
         </div>
         <input id="ir-title" class="form-input" placeholder="Title (e.g. Broken AC)" type="text">
         <div style="display:flex; gap:20px;">
           <select id="ir-category" class="form-input"><option value="maintenance">Maintenance</option><option value="security">Security</option><option value="cleanliness">Cleanliness</option></select>
           <select id="ir-severity" class="form-input"><option value="low">Low</option><option value="high">High</option><option value="critical">Critical</option></select>
         </div>
         <input id="ir-location" class="form-input" placeholder="Location (e.g. Lab 3)" type="text">
         <input id="ir-desc" class="form-input" placeholder="Detailed Description..." type="text">
         <button class="massive-btn" onclick="submitIssue()">Submit Request</button>
      </div>
    </div>
  </div>

  <!-- 2. Faculty Query Modal -->
  <div class="module-modal" id="modal-query">
    <button class="close-btn" onclick="closeModal('modal-query')">✕</button>
    <div class="container" style="max-width:800px; padding-top:40px;">
      <h2 class="text-headline" style="margin-bottom:40px;">QUERY FACULTY</h2>
      <div class="blob-card b-2">
         <select id="q-course" class="form-input" style="color:var(--black); background:var(--white);"><option value="">Select Course...</option></select>
         <select id="q-faculty" class="form-input" style="color:var(--black); background:var(--white);">
           <option value="1">Dr. Ramesh Nair</option><option value="2">Prof. Anita Joshi</option><option value="3">Dr. Vijay Patil</option>
         </select>
         <input id="q-question" class="form-input" placeholder="What is your doubt?" type="text">
         <button class="massive-btn" style="background:var(--white); color:var(--black);" onclick="submitQuery()">Send Message</button>
      </div>
    </div>
  </div>

  <!-- 3. New Public Thread Modal -->
  <div class="module-modal" id="modal-forum-new">
    <button class="close-btn" onclick="closeModal('modal-forum-new')">✕</button>
    <div class="container" style="max-width:800px; padding-top:40px;">
      <h2 class="text-headline" style="margin-bottom:40px;">START FREQUENCY</h2>
      <div class="blob-card b-1">
         <input id="pf-title" class="form-input" style="border-bottom-color:var(--white); color:var(--white);" placeholder="Broadcast Title..." type="text">
         <input id="pf-content" class="form-input" style="border-bottom-color:var(--white); color:var(--white);" placeholder="Message the campus..." type="text">
         <button class="massive-btn" style="background:var(--black); border-color:var(--black);" onclick="submitPublicQuery()">Broadcast &rarr;</button>
      </div>
    </div>
  </div>

  <!-- 4. View Thread Modal -->
  <div class="module-modal" id="modal-forum-view">
    <button class="close-btn" onclick="closeModal('modal-forum-view')">✕</button>
    <div class="container" style="max-width:800px; padding-top:40px; display:flex; flex-direction:column; min-height:90vh;">
      <h2 class="text-headline" id="fv-title" style="margin-bottom:10px;">THREAD</h2>
      <div id="fv-meta" style="font-family:var(--font-base); font-weight:700; opacity:0.6; margin-bottom:40px; text-transform:uppercase;">Loading...</div>
      
      <div class="blob-card" style="margin-bottom:40px; min-height:auto;">
         <div id="fv-content" class="thread-body"></div>
      </div>
      
      <div style="font-family:var(--font-display); font-size:1.5rem; font-weight:700; margin-bottom:20px;">COMMUNICATIONS</div>
      <div id="fv-replies" style="flex:1; display:flex; flex-direction:column; gap:15px; margin-bottom:40px;"></div>
      
      <div style="margin-top:auto;" class="blob-card">
         <input type="hidden" id="fv-pqid">
         <input id="fv-reply-content" class="form-input" placeholder="Transmit reply..." type="text" style="color:var(--black); border-bottom-color:var(--black);">
         <button class="massive-btn" onclick="submitReply()">Transmit</button>
      </div>
    </div>
  </div>

  <!-- Core App Logic -->
  <script>
    const API = '/api';
    let session = null, studentId = null;
    let cameraStream = null, capturedImageData = null;
    let cachedTimetable = [], cachedAttendance = [], cachedNotices = [];

    // --- Cursor Setup ---
    const dot = document.getElementById('cursor-dot');
    const outline = document.getElementById('cursor-outline');
    window.addEventListener('mousemove', (e) => {
      dot.style.left = `${e.clientX}px`; dot.style.top = `${e.clientY}px`;
      outline.animate({ left: `${e.clientX}px`, top: `${e.clientY}px` }, { duration: 500, fill: "forwards", easing: "ease" });
    });
    const attachHover = () => {
      document.querySelectorAll('a, button, input, select, .blob-card, .fluid-row').forEach(el => {
        el.addEventListener('mouseenter', () => { dot.classList.add('focus'); outline.classList.add('focus'); });
        el.addEventListener('mouseleave', () => { dot.classList.remove('focus'); outline.classList.remove('focus'); });
      });
    };

    // --- Utilities ---
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

    // --- Boot Sequence ---
    window.onload = async () => {
      session = JSON.parse(sessionStorage.getItem('user') || 'null');
      if (!session || session.role !== 'student') { window.location.href = 'index.html'; return; }
      studentId = session.profile?.student_id;
      document.getElementById('lbl-name').textContent = session.name;
      
      // Load dropdowns & prefetch core data
      loadCourses();
      await prefetchBaseData();
      
      // Boot into overview
      await renderOverview();
    };

    async function loadCourses() {
      try {
        const r = await fetch(`${API}/courses`); const c = await r.json();
        document.getElementById('q-course').innerHTML = '<option value="">Select course…</option>' + c.map(x => `<option value="${x.course_id}">${x.course_code}</option>`).join('');
      } catch(e) {}
    }

    async function prefetchBaseData() {
      try {
        const [tt, att, nots] = await Promise.all([
           fetch(`${API}/timetable?section=CS-A`).then(r=>r.json()),
           fetch(`${API}/attendance/summary/${studentId}`).then(r=>r.json()),
           fetch(`${API}/notices?role=student`).then(r=>r.json())
        ]);
        cachedTimetable = tt; cachedAttendance = att; cachedNotices = nots;
      } catch(e) { console.error('Prefetch failed'); }
    }

    /* ── ROUTING / VIEW SWITCHER ──────────────── */
    async function switchView(viewName) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-view="${viewName}"]`).classList.add('active');
      
      const canvas = document.getElementById('canvas');
      canvas.classList.add('canvas-fade');
      
      setTimeout(async () => {
        if(viewName==='overview') await renderOverview();
        else if(viewName==='analytics') await renderAnalytics();
        else if(viewName==='comms') await renderComms();
        else if(viewName==='reports') await renderReports();
        
        canvas.classList.remove('canvas-fade');
        attachHover();
      }, 400); // Wait for fade out
    }

    /* ── 1. RENDER OVERVIEW ────────────────────── */
    async function renderOverview() {
      const todayStr = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];
      const todayClasses = cachedTimetable.filter(x => x.day_of_week === todayStr).sort((a,b)=>a.period_no-b.period_no);
      
      let attHtml = '';
      cachedAttendance.slice(0,4).forEach(c => {
         const pct = c.total ? Math.round(100*c.present/c.total) : 0;
         attHtml += `<div class="fluid-row"><span class="fluid-row-label">${c.course_code}</span><span class="fluid-row-val" style="color:${pct<75?'var(--accent)':'var(--white)'}">${pct}%</span></div>`;
      });

      let ttHtml = `<div class="blob-pill" style="border-color:#FFF; color:#FFF; margin-bottom:20px;">${todayStr.toUpperCase()}</div>`;
      if(!todayClasses.length) ttHtml += `<p class="text-headline">FREE DAY</p>`;
      else todayClasses.forEach(c => ttHtml += `<div class="fluid-row" style="border-bottom-color: rgba(255,255,255,0.2);"><span class="fluid-row-label">${c.start_time} - ${c.end_time}</span><span class="fluid-row-val">${c.course_code}</span></div>`);

      let notHtml = '';
      cachedNotices.slice(0,3).forEach(n => notHtml += `<div class="fluid-row" style="flex-direction:column; align-items:flex-start; gap:5px;"><span class="fluid-row-val" style="font-size:1.1rem;">${n.title}</span><span class="fluid-row-label" style="opacity:0.6; font-size:0.75rem;">${new Date(n.date_posted).toLocaleDateString()}</span></div>`);

      const html = `
        <div class="hero-panel">
          <div>
            <p style="font-family:var(--font-display); font-weight:700; text-transform:uppercase;" data-i18n="terminal_acc">Terminal Access</p>
            <h1 class="text-mega" data-i18n="dashboard">DASHBOARD</h1>
          </div>
          <div><button class="massive-btn" onclick="switchView('analytics')" data-i18n="view_analytics">View Analytics &rarr;</button></div>
        </div>
        <div class="grid-masonry" style="padding:0;">
          <div class="blob-card b-2"><div class="text-mega">ATT</div><div class="poster-header"><h3 class="text-headline">Attendance</h3><div class="poster-icon">📊</div></div><div class="poster-content">${attHtml||'No data.'}</div></div>
          <div class="blob-card b-1"><div class="text-mega">TME</div><div class="poster-header"><h3 class="text-headline">Schedule</h3><div class="poster-icon" style="color:var(--blue);background:var(--white);border:none;">⏰</div></div><div class="poster-content">${ttHtml}</div></div>
          <div class="blob-card"><div class="text-mega" style="opacity:0.04;">NET</div><div class="poster-header"><h3 class="text-headline">Broadcasts</h3><div class="poster-icon" style="background:var(--black); color:var(--white);">📢</div></div><div class="poster-content">${notHtml||'No broadcasts.'}</div></div>
        </div>
      `;
      document.getElementById('canvas').innerHTML = html;
      window.applyLanguage(localStorage.getItem('os_lang') || 'en');
    }

    /* ── 2. RENDER ANALYTICS (Full Timetable) ───── */
    async function renderAnalytics() {
      const days = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
      let ttMega = '';
      days.forEach(day => {
         const classes = cachedTimetable.filter(x => x.day_of_week === day).sort((a,b)=>a.period_no-b.period_no);
         ttMega += `<div style="margin-top:20px;"><div class="blob-pill" style="border-color:var(--black); margin-bottom:10px;">${day.toUpperCase()}</div>`;
         if(!classes.length) ttMega += `<div class="fluid-row"><span class="fluid-row-label">No classes mapped</span></div>`;
         else classes.forEach(c => ttMega += `<div class="fluid-row"><span class="fluid-row-label">${c.start_time} - ${c.end_time}</span><span class="fluid-row-val">${c.course_code} (${c.classroom})</span></div>`);
         ttMega += `</div>`;
      });
      
      let attMega = '';
      cachedAttendance.forEach(c => {
         const pct = c.total ? Math.round(100*c.present/c.total) : 0;
         attMega += `<div class="fluid-row"><span class="fluid-row-label">${c.course_code}<br><span style="opacity:0.6;font-size:0.8rem;">P:${c.present} A:${c.absent} L:${c.late}</span></span><span class="text-headline" style="color:${pct<75?'var(--accent)':'var(--white)'}; font-size:3rem;">${pct}%</span></div>`;
      });

      const html = `
        <div class="grid-masonry" style="padding:0;">
          <div class="blob-card" style="grid-column: 1 / -1; background:var(--blue); color:var(--white); border:none; min-height:200px;">
             <h2 class="text-headline" data-i18n="full_tts">FULL TIMETABLE</h2>
             <div style="column-count: 2; column-gap: 40px; margin-top:40px;">${ttMega}</div>
             <div class="text-mega">GRID</div>
          </div>
          <div class="blob-card b-2" style="grid-column: 1 / -1;">
             <h2 class="text-headline" data-i18n="att_report">ATTENDANCE REPORT</h2>
             <div style="margin-top:40px;">${attMega||'<p>No attendance data linked.</p>'}</div>
             <div class="text-mega">DATA</div>
          </div>
        </div>
      `;
      document.getElementById('canvas').innerHTML = html;
      window.applyLanguage(localStorage.getItem('os_lang') || 'en');
    }

    /* ── 3. RENDER COMMS (Forum & Queries) ──────── */
    async function renderComms() {
      let fHtml = '<div class="loading">Loading forum...</div>';
      let qHtml = '<div class="loading">Loading queries...</div>';
      document.getElementById('canvas').innerHTML = `
        <div class="grid-masonry" style="padding:0;">
          <div class="blob-card b-1" id="box-forum" style="grid-column: 1/-1;">${fHtml}</div>
          <div class="blob-card b-2" id="box-query" style="grid-column: 1/-1;">${qHtml}</div>
        </div>
      `;
      
      // Fetch Forum
      try {
         const r = await fetch(`${API}/public-queries`); const threads = await r.json();
         let html = `<div class="poster-header"><h2 class="text-headline">PUBLIC FREQUENCIES</h2><button class="poster-icon" style="border-radius:100px; width:auto; padding:0 20px; font-size:1rem;" onclick="openModal('modal-forum-new')">+ Broadcast</button></div><div class="poster-content" style="margin-top:40px;">`;
         threads.forEach(t => {
            html += `<div class="fluid-row" onclick='openThread(${t.pq_id}, ${JSON.stringify(t)})' style="border-bottom-color:rgba(255,255,255,0.2);">
               <div style="display:flex; flex-direction:column; gap:8px;">
                 <span class="fluid-row-val">${t.title}</span><span class="fluid-row-label" style="opacity:0.8;">By ${t.student_name} · ${new Date(t.created_at).toLocaleDateString()}</span>
               </div>
               <span class="blob-pill" style="border-color:var(--white);">Replies: ${t.replies_count}</span>
            </div>`;
         });
         html += `</div><div class="text-mega">NET</div>`;
         document.getElementById('box-forum').innerHTML = html;
      } catch(e) { document.getElementById('box-forum').innerHTML = '<h2 class="text-headline">ERROR</h2>'; }

      // Fetch Queries
      try {
         const r = await fetch(`${API}/queries?student_id=${studentId}`); const queries = await r.json();
         let html = `<div class="poster-header"><h2 class="text-headline">FACULTY QUERIES</h2><button class="poster-icon" style="color:var(--black); background:var(--white); border-radius:100px; width:auto; padding:0 20px; font-size:1rem;" onclick="openModal('modal-query')">+ Dispatch</button></div><div class="poster-content" style="margin-top:40px;">`;
         queries.forEach(q => {
            html += `<div class="thread-msg">
               <div class="thread-meta"><span>${q.course_name} (To ${q.faculty_name})</span><span style="color:${q.status==='answered'?'var(--blue)':'orange'};">${q.status.toUpperCase()}</span></div>
               <div class="thread-body" style="font-weight:700;">Q: ${q.question}</div>
               <div class="thread-body" style="margin-top:10px; opacity:0.8; font-size:0.95rem; border-top:1px dashed #555; padding-top:10px;">A: ${q.response || 'Pending integration...'}</div>
            </div>`;
         });
         html += `</div><div class="text-mega">Q&A</div>`;
         document.getElementById('box-query').innerHTML = html;
         attachHover();
      } catch(e) { document.getElementById('box-query').innerHTML = '<h2 class="text-headline">ERROR</h2>'; }
      window.applyLanguage(localStorage.getItem('os_lang') || 'en');
    }

    /* ── 4. RENDER REPORTS (Tickets & Camera) ───── */
    async function renderReports() {
      document.getElementById('canvas').innerHTML = `
        <div class="grid-masonry" style="padding:0;">
          <div class="blob-card" id="box-issues" style="grid-column: 1/-1;">Loading tickets...</div>
        </div>
      `;
      try {
         const r = await fetch(`${API}/issues?student_id=${studentId}`); const issues = await r.json();
         let html = `<div class="poster-header"><h2 class="text-headline" data-i18n="campus_tickets">CAMPUS TICKETS</h2><button class="massive-btn" style="width:auto; padding:10px 40px; border-radius:100px;" onclick="openModal('modal-issue')">+ Create Ticket</button></div><div class="poster-content" style="margin-top:40px;">`;
         issues.forEach(i => {
           html += `<div class="fluid-row">
             <div style="display:flex; flex-direction:column; gap:5px;">
               <span class="fluid-row-val">${i.title}</span><span class="fluid-row-label" style="opacity:0.6;">${i.category.toUpperCase()} · ${i.location}</span>
             </div>
             <span class="blob-pill" style="border-color:var(--black); color:${i.status==='resolved'?'green':'var(--accent)'};">${i.status.toUpperCase()}</span>
           </div>`;
         });
         html += `</div><div class="text-mega">LOG</div>`;
         document.getElementById('box-issues').innerHTML = html;
         attachHover();
      } catch(e) { document.getElementById('box-issues').innerHTML = '<h2 class="text-headline">ERROR</h2>'; }
      window.applyLanguage(localStorage.getItem('os_lang') || 'en');
    }

    /* ── PUBLIC FORUM ACTIONS ──────────────────── */
    async function submitPublicQuery() {
      const title = document.getElementById('pf-title').value.trim();
      const content = document.getElementById('pf-content').value.trim();
      const r = await fetch(`${API}/public-queries`, { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ student_id: studentId, title, content }) });
      if (r.ok) { closeModal('modal-forum-new'); alert('Broadcasted!'); renderComms(); }
    }
    async function openThread(id, threadData) {
      document.getElementById('fv-title').textContent = threadData.title;
      document.getElementById('fv-meta').textContent = `Transmitted by ${threadData.student_name} · ${new Date(threadData.created_at).toLocaleDateString()}`;
      document.getElementById('fv-content').textContent = threadData.content;
      document.getElementById('fv-pqid').value = id;
      openModal('modal-forum-view');
      try {
        const r = await fetch(`${API}/public-queries/${id}/replies`); const replies = await r.json();
        const repDiv = document.getElementById('fv-replies');
        repDiv.innerHTML = replies.map(rep => `<div class="thread-msg"><div class="thread-meta"><span>${rep.student_name}</span><span>${new Date(rep.created_at).toLocaleDateString()}</span></div><div class="thread-body">${rep.content}</div></div>`).join('');
      } catch(e) {}
    }
    async function submitReply() {
      const pq_id = document.getElementById('fv-pqid').value;
      const content = document.getElementById('fv-reply-content').value.trim();
      if(!content) return;
      const r = await fetch(`${API}/public-queries/${pq_id}/replies`, { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ student_id: studentId, content }) });
      if (r.ok) { document.getElementById('fv-reply-content').value = ''; alert('Transmitted'); /* Refresh minimal logic */ switchView('comms'); closeModal('modal-forum-view'); }
    }

    /* ── FACULTY QUERY ACTIONS ─────────────────── */
    async function submitQuery() {
      const body = { student_id: studentId, faculty_id: parseInt(document.getElementById('q-faculty').value), course_id: parseInt(document.getElementById('q-course').value), question: document.getElementById('q-question').value.trim() };
      const r = await fetch(`${API}/queries`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if (r.ok) { closeModal('modal-query'); alert('Query Dispatched!'); renderComms(); }
    }

    /* ── ISSUE / CAMERA ACTIONS ────────────────── */
    async function openCamera() {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'environment' } });
        document.getElementById('cam-video').srcObject = cameraStream;
        document.getElementById('cam-video').style.display = 'block';
        document.getElementById('btn-openCam').style.display = 'none';
        document.getElementById('btn-capture').style.display = 'block';
        document.getElementById('btn-stopCam').style.display = 'block';
        capturedImageData = null;
      } catch(e) { alert('Camera access denied'); }
    }
    function capturePhoto() {
      const v = document.getElementById('cam-video'); const c = document.getElementById('cam-canvas');
      c.width = v.videoWidth; c.height = v.videoHeight; c.getContext('2d').drawImage(v,0,0);
      capturedImageData = c.toDataURL('image/jpeg', 0.75);
      document.getElementById('cap-img').src = capturedImageData; document.getElementById('cap-img').style.display = 'block';
      stopCamera();
    }
    function stopCamera() {
      if (cameraStream) { cameraStream.getTracks().forEach(t=>t.stop()); cameraStream = null; }
      document.getElementById('cam-video').style.display = 'none';
      document.getElementById('btn-openCam').style.display = 'block';
      document.getElementById('btn-capture').style.display = 'none';
      document.getElementById('btn-stopCam').style.display = 'none';
    }
    async function submitIssue() {
      const body = {
        student_id: studentId, title: document.getElementById('ir-title').value.trim(), description: document.getElementById('ir-desc').value.trim(),
        location: document.getElementById('ir-location').value.trim(), category: document.getElementById('ir-category').value, severity: document.getElementById('ir-severity').value,
        image_data: capturedImageData || null
      };
      if (!body.title) { alert('Title required'); return; }
      const r = await fetch(`${API}/issues`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if (r.ok) { closeModal('modal-issue'); alert('Ticket submitted!'); renderReports(); }
    }
  </script>

  <!-- Settings Modal -->
  <div class="module-modal" id="modal-settings">
    <button class="close-btn" onclick="document.getElementById('modal-settings').classList.remove('open')">✕</button>
    <div class="container" style="max-width:600px; padding-top:40px; margin:0 auto;">
      <h2 class="text-headline" style="margin-bottom:40px;">SYSTEM SETTINGS</h2>
      <div class="poster-card poster-dark" style="min-height: auto;">
         <div class="setting-row">
            <span class="setting-label">Language / भाषा</span>
            <select class="form-input lang-selector" style="width:200px; margin:0; border-bottom-color:var(--white); color:var(--white); background:transparent;">
               <option style="color:#000;" value="en">English</option>
               <option style="color:#000;" value="hi">Hindi / हिंदी</option>
               <option style="color:#000;" value="ml">Malayalam / മലയാളം</option>
               <option style="color:#000;" value="te">Telugu / తెలుగు</option>
               <option style="color:#000;" value="bn">Bengali / বাংলা</option>
               <option style="color:#000;" value="gu">Gujarati / ગુજરાતી</option>
            </select>
         </div>
         <div class="setting-row" style="border-bottom:none;">
            <span class="setting-label">Accessibility</span>
            <button class="nav-pill" style="border-color:var(--white); color:var(--white);" onclick="document.body.classList.toggle('color-blind');">Toggle High Contrast</button>
         </div>
      </div>
    </div>
  </div>
</body>
</html>
